  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
      text-decoration: none;
    }

    .page-title {
        min-height: unset;
        padding: 2rem 7% 1rem;
    }

    .gallery {
        min-height: unset;
        padding: 0.5rem 6% 5rem;
    }

    :root {
      --bg: #372C2E;
      --text: #f6f6f2;
      --muted: #f5f4df;
      --accent: #DE9E48;
      --panel: #2f2527;
      --panel2: #433437;
    }

    body {
      background: var(--bg);
      color: var(--text);
      padding-top: 120px;
      overflow-x: hidden;
    }


    .page-title {
      padding: 3.5rem 7% 1.5rem;
      text-align: center;
    }

    .page-title h1 {
      font-size: 3.2rem;
      margin-bottom: 0.7rem;
      color: var(--text);
    }

    .page-title p {
      max-width: 850px;
      margin: 0 auto;
      color: var(--muted);
      line-height: 1.8;
      font-size: 1rem;
    }

    .gallery {
      padding: 1rem 6% 5rem;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .row {
      display: grid;
      gap: 16px;
      align-items: stretch;
    }

    .row-a {
      grid-template-columns: 2fr 1fr;
    }

    .row-a .stack {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 16px;
    }

    .row-b {
      grid-template-columns: 1fr 2fr;
    }

    .row-b .stack {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 16px;
    }

    .row-c {
      grid-template-columns: 1fr 1fr 1fr;
    }

    .row-d {
      grid-template-columns: 1.2fr 1.2fr;
    }

    .photo-card {
      background: var(--panel);
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid rgba(222, 158, 72, 0.18);
      min-height: 260px;
    }

    .photo-card.alt {
      background: var(--panel2);
    }

    .photo-card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      transition: transform 0.35s ease;
    }

    .photo-card:hover img {
      transform: scale(1.02);
    }

    .portrait {
      min-height: 540px;
    }

    .landscape {
      min-height: 260px;
    }

    .large-landscape {
      min-height: 380px;
    }

    .medium {
      min-height: 320px;
    }

    @media (max-width: 1000px) {
      .row-a,
      .row-b,
      .row-c,
      .row-d {
        grid-template-columns: 1fr;
      }

      .row-a .stack,
      .row-b .stack {
        grid-template-rows: auto;
        grid-template-columns: 1fr 1fr;
      }

      .portrait,
      .landscape,
      .large-landscape,
      .medium {
        min-height: 280px;
      }
    }

    @media (max-width: 768px) {

      .page-title h1 {
        font-size: 2.4rem;
      }

      .row-a .stack,
      .row-b .stack {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
